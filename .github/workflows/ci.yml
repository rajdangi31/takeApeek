name: TakeAPeek Quality Guard

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    
    - name: Use Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: 'npm'

    - name: Install dependencies
      run: npm install --legacy-peer-deps

    - name: Enforce Zero-Warning Policy (Lint)
      run: npm run lint

    - name: Run Unit Tests
      run: npx vitest run

    - name: Production Build Verification
      run: npm run build
